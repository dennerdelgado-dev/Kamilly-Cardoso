<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="description" content="Media Kit Oficial de Kamilly Cardoso - Criadora de Conteúdo Digital. Beleza, Cabelos, Moda, Lifestyle e Achadinhos." />
    
    <title>Kamilly Cardoso | Media Kit Oficial</title>

    <!-- Preconnect to Google Fonts CDN to speed up loading on mobile -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload only the high-priority hero image for rapid LCP -->
    <link rel="preload" as="image" type="image/webp" href="/images/hero.webp" fetchpriority="high" />

    <!-- Inline Critical Styles above the fold to eliminate render-blocking CSS delay -->
    <style>
      :root {
        --color-primary-lightpink: #FADADD;
        --color-primary-nude: #FAF8F7;
        --color-primary-pink: #f4b4c3;
        --color-brand-dark: #0A0A0A;
        --color-brand-card: #111111;
        --color-brand-border: rgba(255, 255, 255, 0.1);
      }
      html, body {
        background-color: #0A0A0A;
        color: #FAF8F7;
        margin: 0;
        font-family: "Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif;
        scroll-behavior: smooth;
        min-height: 100vh;
        overflow-x: hidden;
      }
      section {
        contain: layout style;
      }
    </style>

    <!-- Google Fonts CDN dynamic high-performance non-render-blocking loading -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
